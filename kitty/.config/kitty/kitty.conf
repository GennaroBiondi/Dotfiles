# Setup fonts
# BEGIN_KITTY_FONTS
font_family      family="JetBrains Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# Set font size
font_size 15

# Set margin
window_margin_width 10

# Colorscheme
background #1e1e2e
foreground #cdd6f4
cursor #cdd6f4

# Animations
cursor_trail 1
