# Setup fonts
# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# Set font size
font_size 15

# Set margin
window_margin_width 10

# Colorscheme
background #080808
foreground #CCCCCC
cursor #CCCCCC

# Animations
cursor_trail 1

# Set background opts
background_opacity 0.85
background_blur 30
